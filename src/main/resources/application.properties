## Database (Supabase / PostgreSQL)
## On Render, set DATABASE_URL to your Supabase connection string, e.g.:
## postgresql://postgres.eunkvnuoxijeokgwgkpy:<password>@aws-1-ap-northeast-2.pooler.supabase.com:5432/postgres
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.hikari.connection-init-sql=SELECT 1
spring.datasource.driver-class-name=org.postgresql.Driver

## JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

## JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

## File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=${FILE_UPLOAD_DIR:uploads/resumes}

## Gemini API
gemini.api.key=${GEMINI_API_KEY}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent

## Server
## Render injects PORT automatically; default to 8080 locally
server.port=${PORT:8080}

## Actuator (health check for Render & Docker)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
